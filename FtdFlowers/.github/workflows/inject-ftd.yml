name: Inject FTD 5K Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # lets you run it manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (if any)
        run: |
          cd ..
          npm install  # if you have a package.json

      - name: Run FTD injector + deploy
        run: |
          cd ..
          node inject-and-deploy-ftd.js

      - name: Show status
        run: |
          git status
          git log -1
