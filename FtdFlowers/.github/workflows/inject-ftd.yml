name: Inject FTD 5K Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # lets you run it manually from GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ensures we can push back

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (if any)
        run: |
          cd ..
          npm ci

      - name: Run FTD injector + deploy
        run: |
          cd ..
          ls -l
          node inject-and-deploy-ftd.js

      - name: Show git status
        run: |
          git status
          git log -1
