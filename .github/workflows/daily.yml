name: Integrated Daily Generator

on:
  workflow_dispatch:  # Manual 'Run' Button
  schedule:
    - cron: "0 9 * * *"  # Runs daily at 9:00 AM

jobs:
  vulture-generation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Updated to v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: '24' # Moves to Node 24 to kill warnings

      - name: Install Dependencies
        run: npm install axios

      - name: Run Vulture 10K Pro
        # This triggers your 2,000 city generation logic
        run: node vulture_10k_pro.js

      - name: Commit & Push
        run: |
          git config user.name "vulture-bot"
          git config user.email "bot@brightlane.dev"
          git add .
          git commit -m "Vulture 10K Hyperlocal Blast [$(date)]" || exit 0
          git push

      - name: IndexNow Blast
        # This tells Bing/Yandex to index the 2,000 new pages immediately
        run: node index-blast.js
