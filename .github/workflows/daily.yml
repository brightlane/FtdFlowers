name: Vulture 10K Hyperlocal Expansion

on:
  workflow_dispatch: # This gives you the manual "Run" button
  schedule:
    - cron: "0 10 * * *" # Runs every morning automatically

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate 2000 Nodes
        # This is where the magic happens
        run: node vulture_10k_pro.js

      - name: Deploy to GitHub Pages
        run: |
          git config --local user.name "Vulture-Bot"
          git config --local user.email "bot@brightlane.dev"
          git add .
          git commit -m "Vulture 10K: Hyperlocal Blast [$(date)]" || exit 0
          git push
