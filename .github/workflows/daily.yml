name: Vulture 10K Hyperlocal Expansion

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  vulture-generation:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This is the critical line
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for a clean push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install axios

      - name: Generate 2000 Nodes
        run: node vulture_10k_pro.js

      - name: Generate Simple Blog
        run: |
          echo "<html><body style='background:#0a0b10;color:white;'><h1>Daily Mother's Day Update</h1><p>Fresh floral deals for $(date)</p></body></html>" > blog.html

      - name: Commit & Push
        run: |
          git config --local user.name "vulture-bot"
          git config --local user.email "bot@brightlane.dev"
          git add .
          git add dist/*.html # Explicitly tell git to look in the dist folder
          git commit -m "Vulture 10K: Blog + 2000 Cities [$(date)]" || echo "No changes to commit"
          git push origin main
