name: Vulture 10K Hyperlocal Expansion

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  vulture-generation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Fixes the v3 warning

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Fixes the v3 warning
        with:
          node-version: '24' # Moves you to the latest stable version

      - name: Install Dependencies
        run: npm install axios

      - name: Generate 2000 Nodes
        # This MUST match the filename you saved earlier
        run: node vulture_10k_pro.js

      - name: Commit & Push
        run: |
          git config --local user.name "Vulture-Bot"
          git config --local user.email "bot@brightlane.dev"
          git add .
          git commit -m "Vulture 10K: 2000 City Blast [$(date)]" || exit 0
          git push

      - name: IndexNow Blast
        run: node index-blast.js
