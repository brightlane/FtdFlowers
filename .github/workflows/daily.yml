name: Vulture 10K Hyperlocal Expansion

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *" # Runs daily at 9:00 AM

jobs:
  vulture-generation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Fixes v3 warning

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Fixes v3 warning
        with:
          node-version: '24' # Fixes Node 20 warning

      - name: Install Dependencies
        run: npm install axios

      - name: Run Vulture 10K Pro
        # Make sure your script name matches exactly
        run: node vulture_10k_pro.js

      - name: Commit pSEO files
        run: |
          git config user.name "vulture-bot"
          git config user.email "bot@vulture.com"
          git add .
          git commit -m "Vulture Protocol Blast [$(date)]" || exit 0
          git push

      - name: IndexNow Blast
        run: node index-blast.js
