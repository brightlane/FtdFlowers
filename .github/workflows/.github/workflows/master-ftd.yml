name: Master FTD 5K Injector

on:
  workflow_dispatch:

jobs:
  inject-ftd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show working directory (debug)
        run: |
          pwd
          ls -la

      - name: Run FTD Injector
        run: |
          echo "🚀 Starting FTD 5K Injector..."
          node inject-and-deploy-ftd.js
          echo "✅ Injector finished"

      - name: Show repo status
        run: |
          git status
          git log -1
