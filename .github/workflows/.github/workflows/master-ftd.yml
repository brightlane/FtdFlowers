name: Master FTD 5K Injector

on:
  workflow_dispatch:

jobs:
  inject-ftd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Debug environment
        run: |
          echo "=== WORKDIR ==="
          pwd
          echo "=== FILE LIST ==="
          ls -R
          echo "=== NODE VERSION ==="
          node -v

      - name: Run injector (verbose)
        run: |
          echo "🚀 Starting injector..."
          node inject-and-deploy-ftd.js || {
            echo "❌ SCRIPT FAILED"
            exit 1
          }
          echo "✅ Injector finished"

      - name: Git debug
        run: |
          echo "=== GIT STATUS ==="
          git status
          echo "=== LAST COMMIT ==="
          git log -1
