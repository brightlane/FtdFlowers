name: Master FTD 5K Injector

on:
  workflow_dispatch:  # lets you press Run workflow

jobs:
  inject-ftd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate and deploy FTD 5K pages
        run: |
          cd ..
          node inject-and-deploy-ftd.js

      - name: Final status
        run: |
          git status
          git log -1
