name: Reliable SEO Publisher

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

concurrency:
  group: seo-pipeline-lock
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run FULL pipeline (SAFE ORDER)
        run: node publish.js

      - name: Force commit if changes exist
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "auto publish $(date -u)" || echo "no changes"
          git push
