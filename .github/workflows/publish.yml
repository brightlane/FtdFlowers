name: Full SEO Publisher

on:
  schedule:
    - cron: "* * * * *"   # every minute
  workflow_dispatch:

concurrency:
  group: seo-pipeline
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install || true

      # ----------------------------
      # 1. CORE PAGE GENERATION
      # ----------------------------
      - name: Run main publisher
        run: node publish.js

      # ----------------------------
      # 2. BLOG SYSTEM
      # ----------------------------
      - name: Generate blogs
        run: node generate-daily-blog.js || true

      # ----------------------------
      # 3. SEO ENGINE / INDEXING
      # ----------------------------
      - name: Run SEO engine
        run: node seo-engine/index.js || true

      # ----------------------------
      # 4. INDEX SUBMISSION
      # ----------------------------
      - name: IndexNow / submission
        run: node index-blast.js || true

      # ----------------------------
      # 5. BACKLINK / FOOTER SYSTEM
      # ----------------------------
      - name: Inject backlinks
        run: node backlink_injector.js || true

      # ----------------------------
      # 6. SITEMAP REBUILD
      # ----------------------------
      - name: Rebuild sitemaps
        run: node sitemap-gen.js || true

      # ----------------------------
      # 7. COMMIT + DEPLOY
      # ----------------------------
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto full pipeline $(date -u)" || echo "No changes"
          git push
