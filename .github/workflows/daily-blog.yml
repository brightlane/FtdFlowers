name: Simple Daily Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *" # Runs an hour before the Vulture

jobs:
  simple-echo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Updated to v4

      - name: Generate simple file
        run: |
          echo "<html><body><h1>Daily FTD Post</h1><p>Fresh content for $(date)</p></body></html>" > blog.html

      - name: Commit simple change
        run: |
          git config user.name "simple-bot"
          git config user.email "bot@simple.com"
          git add blog.html
          git commit -m "Simple update [$(date)]" || exit 0
          git push
