name: Daily Blog Generator
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Git config
        run: |
          git config user.name "auto-blog-bot"
          git config user.email "bot@brightlane.io"

      - name: Pull latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Run blog generator
        run: node generate-daily-blog.js

      - name: Commit and push
        run: |
          git add .
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Daily blog update"
          git fetch origin main
          if git rebase -X theirs origin/main; then
            git push origin main && exit 0
          fi
          git rebase --abort || true
          git reset --hard origin/main
          git add .
          git diff --staged --quiet && exit 0
          git commit -m "Daily blog update (retry)"
          git push origin main
