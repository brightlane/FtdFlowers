name: Daily Blog Generator
on:
  workflow_dispatch: # <--- THIS ADDS THE 'RUN' BUTTON
  schedule:
    - cron: '0 9 * * *' # Runs every morning at 9AM

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios # Required if you use the Bing Blast script

      - name: Run Vulture Generator
        run: node generate-daily-blog.js

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Vulture Protocol: Daily Blast [$(date +'%Y-%m-%d')]" || exit 0
          git push
