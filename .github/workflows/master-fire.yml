name: MASTER FIRE PAGE GENERATOR

on:
  workflow_dispatch:

jobs:
  build-pages:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Debug repo state
      - name: Show repo structure
        run: |
          echo "📂 Repo structure:"
          ls -R

      # 4. RUN ALL PAGE GENERATORS
      - name: Generate FTD Pages
        run: |
          echo "🔥 Running FTD generator..."
          node ftd-5k-blast.js || true
          node inject-3m-ftd-5k.js || true
          node inject-ftd-locally.js || true

      - name: Generate Blog Pages
        run: |
          echo "📝 Running blog generator..."
          node generate-daily-blog.js || true

      - name: Generate Sitemap
        run: |
          echo "🧭 Generating sitemap..."
          node sitemap-gen.js || true

      # 5. VERIFY OUTPUT (IMPORTANT)
      - name: Check generated files
        run: |
          echo "=== BLOG ==="
          ls -R blog || echo "No blog folder"

          echo "=== ROOT FILES ==="
          find . -name "*.html"

      # 6. COMMIT ALL GENERATED PAGES (THIS WAS MISSING BEFORE)
      - name: Commit generated pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "🔥 MASTER FIRE: generated pages" || echo "No changes to commit"

          git push

      # 7. FINAL STATUS
      - name: Final status
        run: |
          git status
          git log -1
