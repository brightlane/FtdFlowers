<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | BrightLane Flowers 2026</title>
    
    <!-- Automatic Redirect to Mother's Day Hub after 5 seconds -->
    <meta http-equiv="refresh" content="5;url=https://brightlane.github.io/FtdFlowers/">

    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding: 50px; background: #f9f9ff; color: #111; }
        .container { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid #e20613; }
        h1 { color: #004b98; font-size: 3rem; margin: 0; }
        p { font-size: 1.2rem; color: #666; }
        .btn { display: inline-block; background: #e20613; color: white; padding: 15px 30px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #b30000; transform: scale(1.05); }
        .timer { font-size: 0.9rem; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Oops!</h1>
        <p>That flower must have wilted. We can't find the page you're looking for.</p>
        
        <div style="padding: 20px; background: #fff9e6; border-radius: 8px; margin: 20px 0;">
            <strong>Don't miss Mother's Day!</strong><br>
            We're still delivering hand-arranged bouquets across USA & Canada for Sunday, May 10th.
        </div>

        <a href="https://brightlane.github.io/FtdFlowers/" class="btn">Shop Mother's Day Flowers Now</a>
        
        <p class="timer">Redirecting you to our main floral gallery in <span id="seconds">5</span> seconds...</p>
    </div>

    <script>
        let timeLeft = 5;
        const timerElement = document.getElementById('seconds');
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                timerElement.innerText = timeLeft;
            }
        }, 1000);
    </script>
</body>
</html>
