<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found | FTD Flowers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Optional: prevent indexing of 404 page -->
  <meta name="robots" content="noindex">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fafafa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 20px;
    }
    h1 {
      font-size: 72px;
      margin: 0;
      color: #e74c3c;
    }
    h2 {
      margin: 10px 0;
    }
    p {
      color: #666;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #27ae60;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }
    a:hover {
      background: #219150;
    }
  </style>

  <script>
    // Optional: redirect after 5 seconds
    setTimeout(function () {
      window.location.href = "/FtdFlowers/";
    }, 5000);
  </script>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Oops! Page not found</h2>
    <p>The page you’re looking for doesn’t exist or has been moved.</p>
    <a href="/FtdFlowers/">Go back home</a>
    <p style="font-size:12px; margin-top:15px;">Redirecting to homepage in 5 seconds...</p>
  </div>
</body>
</html>
